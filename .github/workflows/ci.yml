name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

# Cancel in-flight runs when a new commit lands on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-macos:
    name: build + test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          # go.mod's `go` directive (1.26.x) drives the actual toolchain via
          # GOTOOLCHAIN=auto. setup-go installs a baseline; Go fetches the
          # exact version go.mod requests on first build.
          go-version-file: go.mod
          check-latest: true

      - name: Install cgo dependencies
        run: |
          brew update
          # v0.1: jpeg-turbo, openjpeg. v0.2 adds: jpeg-xl (libjxl), libavif,
          # webp, openjph (OpenJPH for HTJ2K).
          brew install jpeg-turbo openjpeg pkg-config libtiff jpeg-xl libavif webp openjph

      - name: Cache fixtures
        id: fixtures-cache
        uses: actions/cache@v4
        with:
          path: sample_files
          key: wsi-fixtures-v8-${{ hashFiles('.github/fixtures.sha256') }}

      - name: Download fixtures
        if: steps.fixtures-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p sample_files
          cd sample_files
          # Pull only the tarballs wsitools verifies (see fixtures.sha256) so CI
          # doesn't fetch the full corpus (philips-tiff/bif are large and unused
          # here). Add more --pattern lines if a test starts needing them.
          gh release download v8 \
            --repo wsilabs/wsi-fixtures \
            --pattern 'svs.tar' \
            --pattern 'ndpi.tar' \
            --pattern 'cog-wsi.tar' \
            --pattern 'dicom.tar' \
            --pattern 'ome-tiff.tar'
          for t in *.tar; do
            tar xf "$t" && rm "$t"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify fixture SHA-256
        run: |
          cd sample_files
          shasum -a 256 -c ../.github/fixtures.sha256

      - name: go build
        run: go build ./...

      - name: go vet
        run: go vet ./...

      - name: go test
        env:
          WSI_TOOLS_TESTDIR: ${{ github.workspace }}/sample_files
        # 30m, not Go's 10m default: the heavy cmd/wsitools -race suite runs
        # ~3min uncontended and can balloon under CI load — a too-tight timeout
        # false-FAILs (looks like a crash). See CLAUDE.md "race-suite timeout".
        run: go test ./... -race -count=1 -timeout 30m

      # End-to-end CLI suite (tests/integration, //go:build integration). These
      # shell out to a freshly built wsitools binary, so the harness runs
      # without -race (the work happens in the subprocess); -timeout is generous
      # per CLAUDE.md's heavy-suite guidance. Tests skip gracefully when a
      # fixture isn't among the three CI pulls (see fixtures.sha256), so the
      # suite exercises every path those fixtures reach and skips the rest.
      - name: go test (integration)
        env:
          WSI_TOOLS_TESTDIR: ${{ github.workspace }}/sample_files
        run: go test -tags integration ./tests/integration/... -count=1 -timeout 30m

      # DICOM conformance gate: convert fixtures (JPEG / JPEG 2000 / HTJ2K +
      # the A4b LZW→JPEG re-encode) to WSM and validate every emitted instance
      # with David Clunie's dciodvfy (dicom3tools). dciodvfy exits non-zero only
      # on errors (benign warnings are exit 0), so `make dicom-validate` fails
      # the build iff an instance is non-conformant. The macexe is a pinned
      # snapshot (universal binary; runs natively on the arm64 runner).
      - name: Cache dciodvfy (dicom3tools)
        id: dciodvfy-cache
        uses: actions/cache@v4
        with:
          path: dicom3tools
          # Key includes the mirror source so a cache miss exercises the
          # gh-release-download path (bump when the pinned snapshot changes).
          key: dicom3tools-macexe-20260320044638-mirror

      - name: Download dciodvfy
        if: steps.dciodvfy-cache.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ZIP=dicom3tools_macexe_1.00.snapshot.20260320044638.zip
          # dciodvfy is mirrored on WSILabs/dicom3tools-mirror (release v1, BSD —
          # see dicom3tools-COPYRIGHT.txt) so CI does NOT depend on dclunie.com
          # being reachable. The dciodvfy-watch workflow notifies us when upstream
          # moves/prunes the pinned snapshot or ships a newer one (then publish a
          # new mirror release + bump this pin). Hard-fail (don't skip) if the
          # mirror is gone: a conformance gate that silently disables itself is
          # worse than one that breaks loudly — the ::error:: makes it actionable.
          if ! gh release download v1 --repo WSILabs/dicom3tools-mirror --pattern "$ZIP" --dir .; then
            echo "::error title=dciodvfy unavailable::Could not download $ZIP from WSILabs/dicom3tools-mirror release v1 — the DICOM conformance gate cannot run. Restore the mirror asset."
            exit 1
          fi
          unzip -q "$ZIP" -d dicom3tools
          rm "$ZIP"

      - name: DICOM conformance (dciodvfy)
        env:
          WSI_TOOLS_TESTDIR: ${{ github.workspace }}/sample_files
        run: |
          chmod +x dicom3tools/dciodvfy
          xattr -dr com.apple.quarantine dicom3tools 2>/dev/null || true
          make dicom-validate DCIODVFY="$PWD/dicom3tools/dciodvfy"

  build-windows:
    name: build (Windows)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          # v0.2 codec deps: libjxl (jpegxl), libavif, libwebp.
          # OpenJPH (htj2k) is NOT packaged on msys2 as of 2026-05; the
          # Windows build skips it via -tags nohtj2k below.
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-go
            mingw-w64-x86_64-libjpeg-turbo
            mingw-w64-x86_64-openjpeg2
            mingw-w64-x86_64-libjxl
            mingw-w64-x86_64-libavif
            mingw-w64-x86_64-libwebp
            mingw-w64-x86_64-pkgconf

      - name: go build (Windows, htj2k disabled — openjph not packaged for msys2)
        run: |
          export PATH=/mingw64/bin:$PATH
          export PKG_CONFIG_PATH=/mingw64/lib/pkgconfig
          export CGO_ENABLED=1
          go env GOOS GOARCH CC CXX
          go build -tags nohtj2k ./...

      - name: go vet
        run: |
          export PATH=/mingw64/bin:$PATH
          export PKG_CONFIG_PATH=/mingw64/lib/pkgconfig
          export CGO_ENABLED=1
          go vet -tags nohtj2k ./...

      # Tests deliberately deferred — running `go test -race` on Windows with
      # cgo is brittle (msys2 Go vs Windows file-system semantics) and the
      # full unit suite already passes on macOS. v0.2.x will add Windows tests
      # once the cgo edges are smoothed and OpenJPH is packaged.
